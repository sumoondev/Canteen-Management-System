{% extends "index.html" %}
{% block start %}
{% load static %}
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="center-ctn shadow-lg">
    <form class="card p-4 shadow-lg auth-card auth-form animate-fade-in-up" method="post" id="login-form">
        {% csrf_token %}
        {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <div class="mb-3">
            <h2 class="text-center animate-fade-in stagger-1">
                <i class="fa fa-user-circle me-2 auth-title-icon" style="color:var(--accent)"></i>Log In
            </h2>
            <hr />

            <div class="animate-fade-in-up stagger-2">
                <label class="form-label">Username:</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa fa-user text-muted"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
            </div>

            <div class="animate-fade-in-up stagger-3 mt-2">
                <label class="form-label">Password:</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control" id="login-password" placeholder="Enter your password" required>
                    <button class="btn btn-outline-secondary password-toggle" type="button" id="login-toggle" aria-label="Toggle password visibility">
                        <i class="fa fa-eye"></i>
                    </button>
                </div>
            </div>

            <p class="mt-3 animate-fade-in stagger-4">
                Don't have an account? <a href="/register/">Register</a>
            </p>

            <div class="d-grid mt-3 animate-fade-in-up stagger-5">
                <button type="submit" class="btn btn-primary" id="login-submit">
                    <span class="btn-spinner"></span>
                    <span class="btn-label"><i class="fa fa-sign-in-alt me-1"></i> Sign In</span>
                </button>
            </div>

            {% if messages %}
            <div class="alert alert-danger mt-3 w-100 animate-shake" id="login-error">
                <i class="fa fa-exclamation-circle me-1"></i>
                {% for message in messages %}
                    <span>{{ message }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </form>
</div>

<script>
    // Password toggle
    const loginToggle = document.getElementById('login-toggle');
    const loginPassword = document.getElementById('login-password');
    if (loginToggle && loginPassword) {
        loginToggle.addEventListener('click', () => {
            const isHidden = loginPassword.type === 'password';
            loginPassword.type = isHidden ? 'text' : 'password';
            loginToggle.innerHTML = isHidden ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
        });
    }

    // Submit loading state
    const loginForm = document.getElementById('login-form');
    const loginSubmit = document.getElementById('login-submit');
    if (loginForm && loginSubmit) {
        loginForm.addEventListener('submit', () => {
            loginSubmit.classList.add('is-loading');
            loginSubmit.disabled = true;
        });
    }
</script>

{% endblock %}
