{% extends "index.html" %}
{% block start %}
{% load static %}
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="center-ctn shadow-lg">
  <form class="card p-4 shadow-lg" method="post" enctype="multipart/form-data" style="width: min(560px, 96%);">
    {% csrf_token %}
    <div class="mb-3">
      <h2 class="text-center">Register</h2>
      <hr />

      <label for="role" class="form-label">Role:</label>
      <select name="role" id="role" class="form-select mb-2">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>

      <label class="form-label">UserCode:</label>
      <input type="text" name="user_code" class="form-control mb-2" required>

      <label class="form-label">Username:</label>
      <input type="text" name="username" class="form-control mb-2" required>

      <label class="form-label">Password:</label>
      <input type="password" name="password" class="form-control mb-2" required>

      <p class="mt-2">Already have an account? <a href="/login/">Log In</a></p>

      <div class="d-grid mt-3">
        <button type="submit" class="btn btn-primary">Register</button>
      </div>

      {% if messages %}
      <div class="alert alert-info mt-3" role="alert">
        <ul class="messages mb-0">
        {% for message in messages %}
          <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
        </ul>
      </div>
      {% endif %}
    </div>
  </form>
</div>

{% endblock %}
