<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Canteen Management System</title>

    {% load static %}

    <style>
        :root {
            --accent: #1d4ed8;
            --accent-contrast: #ffffff;
            --accent-soft: #dbeafe;
            --bg: #f5f6f8;
            --surface: #ffffff;
            --text: #111827;
            --muted: #6b7280;
        }

        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: var(--text);
        }
        .card {
            border: none;
            border-radius: 8px;
            background-color: var(--surface);
        }
        .table {
            margin-bottom: 0;
        }
        .btn {
            border-radius: 5px;
        }
        .form-control, .form-select {
            border-radius: 5px;
        }
        td,th{
            padding: 10px;
            align-items:center;
        }

        /* Fullscreen blurred background */
        .bg-image{
            position: fixed;
            inset: 0;
            background: center/cover no-repeat url('{% static "background.jpg" %}');
            filter: blur(6px);
            transform: scale(1.03);
            z-index: -2;
        }

        /* Dim overlay to make content readable */
        .bg-overlay{
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: -1;
        }

        /* Centered content container for the button */
        .center-ctn{
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .center-ctn .btn-lg {
            padding: 14px 30px;
            font-size: 1.25rem;
        }

        .auth-card {
            width: min(520px, 92%);
        }

        .auth-card-wide {
            width: min(560px, 96%);
        }

        .admin-action-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .btn-primary,
        .bg-primary {
            background-color: var(--accent) !important;
            border-color: var(--accent) !important;
            color: var(--accent-contrast) !important;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: #1e40af !important;
            border-color: #1e40af !important;
        }

        .btn-success,
        .bg-success {
            background-color: var(--accent) !important;
            border-color: var(--accent) !important;
            color: var(--accent-contrast) !important;
        }

        .btn-success:hover,
        .btn-success:focus {
            background-color: #1e40af !important;
            border-color: #1e40af !important;
        }

        .badge.bg-warning {
            background-color: var(--accent-soft) !important;
            color: #1f2937 !important;
        }

        a {
            color: var(--accent);
        }

    </style>
</head>

<body>
    {% block start %}
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="center-ctn">
        <a href="/login/" class="btn btn-primary btn-lg shadow">
            <i class="fa fa-solid fa-bowl-food me-2"></i> Order Food
        </a>
    </div>

    {% endblock %}

    {% if clear_cart_user_id %}
    <script>
        try {
            localStorage.removeItem('cart');
            localStorage.removeItem('cart_{{ clear_cart_user_id }}');
        } catch (e) {
            // ignore storage errors
        }
    </script>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
