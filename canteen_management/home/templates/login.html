{% extends "index.html" %}
{% block start %}
{% load static %}
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="center-ctn shadow-lg">
    <form class="card p-4 shadow-lg auth-card auth-form" method="post">
        {% csrf_token %}
        {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <div class="mb-3">
            <h2 class="text-center">Log In</h2>
            <hr />

            <label class="form-label">Username:</label>
            <input type="text" name="username" class="form-control mb-2" required>

            <label class="form-label">Password:</label>
            <div class="input-group">
                <input type="password" name="password" class="form-control" id="login-password" required>
                <button class="btn btn-outline-secondary" type="button" id="login-toggle">
                    <i class="fa fa-eye"></i>
                </button>
            </div>

            <p class="mt-2">
                Don't have an account? <a href="/register/">Register</a>
            </p>

            <div class="d-grid mt-3">
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>

            {% if messages %}
            <div class="alert alert-danger mt-3 w-100">
                {% for message in messages %}
                    <p class="mb-0">{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </form>
</div>

<script>
    const loginToggle = document.getElementById('login-toggle');
    const loginPassword = document.getElementById('login-password');
    if (loginToggle && loginPassword) {
        loginToggle.addEventListener('click', () => {
            const isHidden = loginPassword.type === 'password';
            loginPassword.type = isHidden ? 'text' : 'password';
            loginToggle.innerHTML = isHidden ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
        });
    }
</script>

{% endblock %}
